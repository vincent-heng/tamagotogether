<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotogether</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-header" style="position: absolute; top: 1rem; right: 1rem; display: flex; align-items: center; gap: 1rem;">
        <div id="user-info" class="hidden" style="display: flex; align-items: center; gap: 1rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(255, 255, 255, 0.8); padding: 0.3rem 0.8rem; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <span style="font-size: 1.2rem;">🪙</span>
                <span id="user-coins" style="font-weight: 700; color: #2d3436;">0</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <img id="user-avatar" src="" style="width: 32px; height: 32px; border-radius: 50%;">
                <span id="user-name" style="font-weight: 600;"></span>
            </div>
        </div>
        <a id="login-btn" href="/api/auth/discord/login" style="background: #5865F2; color: white; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 0.9rem;">Login with Discord</a>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0;">Tamagofox</h1>
            <select id="lang-select" style="padding: 5px 10px; border-radius: 8px; border: 1px solid #dfe6e9; font-family: inherit; cursor: pointer;">
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
            </select>
        </div>
        
        <div class="tamagotchi-container">
            <!-- Placeholder for future canvas -->
            <div class="fox-placeholder">🦊</div>
        </div>

        <div class="status-box">
            <h2 id="mood-text">Chargement...</h2>
            <p id="feeds-count"></p>
            <p id="feed-message"></p>
        </div>

        <div class="actions">
            <button id="feed-btn" disabled>Nourrir</button>
        </div>

        <div id="play-section" class="play-section hidden">
            <div class="status-box">
                <h2 id="playfulness-text"></h2>
                <p id="plays-count"></p>
                <p id="play-message"></p>
            </div>
            <div class="actions">
                <button id="play-btn" disabled>Jouer</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
