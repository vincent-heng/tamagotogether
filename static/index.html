<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotogether</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tamagofox</h1>
        
        <div class="tamagotchi-container">
            <!-- Placeholder for future canvas -->
            <div class="fox-placeholder">🦊</div>
        </div>

        <div class="status-box">
            <h2 id="mood-text">Chargement...</h2>
            <p id="feeds-count"></p>
            <p id="feed-message"></p>
        </div>

        <div class="actions">
            <button id="feed-btn" disabled>Nourrir</button>
        </div>

        <div id="play-section" class="play-section hidden">
            <div class="status-box">
                <h2 id="playfulness-text"></h2>
                <p id="plays-count"></p>
                <p id="play-message"></p>
            </div>
            <div class="actions">
                <button id="play-btn" disabled>Jouer</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
